name: Run Gemini Script

on:
  push:
    branches: [ main ] # Runs every time you push to main

jobs:
  execute-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run my script
        # This is where the magic happens: mapping the secret to an ENV variable
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node index.js
